<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneBharat</title>
    <link rel="icon" type="image/jpeg" href="/src/assets/images/onebharat_logo_1782755871364.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => console.log("OneBharat ServiceWorker registered:", reg.scope))
            .catch((err) => console.log("OneBharat ServiceWorker failed:", err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
